<ion-content [fullscreen]="true">
  <div class="add-advance">
    <div class="title-container">
      <div routerLink="/admin/bus">
        <ion-icon name="chevron-back-outline"></ion-icon>Add Advance
      </div>
    </div>
    <ion-card>
      <form [formGroup]="busForm">
        <div class="header-container">
          <h2>Add Advance</h2>
        </div>
        <ion-grid>
          <ion-row>
            <ion-col size="12" size-md="6">
            <label>
                Amount
                <ion-text color="danger" *ngIf="isInvalid('amount')">
                  Amount is required
                </ion-text>
              </label>
              <ion-input formControlName="amount" placeholder="Eg: $ 45.00">
              </ion-input>
            </ion-col>

            <!-- Seating Capacity -->
            <ion-col class="align-right-field" size="12" size-md="6">
               <label>
                Advance Date
                <ion-text color="danger" *ngIf="isInvalid('expenseDate')">
                  Advance Date is required
                </ion-text>
              </label>

              <!-- Custom Input -->
              <div class="date-box" (click)="openPicker()">
                <span>
                  {{ busForm.get('expenseDate')?.value ?
                  (busForm.get('expenseDate')?.value | date:'MM/dd/yyyy') :
                  'mm/dd/yyyy' }}
                </span>

                <ion-icon name="calendar-clear-outline"></ion-icon>
              </div>

              <!-- Date Picker -->
              <ion-modal [isOpen]="isOpen" (didDismiss)="isOpen = false">
                <ng-template>
                  <ion-datetime
                   formControlName="expenseDate"
                    presentation="date"
                   
                    
                    (ionChange)="selectDate($event)"
                  ></ion-datetime>
                </ng-template>
              </ion-modal>
            </ion-col>

            <!-- Service Start Date -->
            <ion-col class="align-right-field" size="12" size-md="6">
              <label>Reason
                 <ion-text color="danger" *ngIf="isInvalid('expenseDate')">
                  reason is required
                </ion-text>
              </label>
              <ion-input
                formControlName="notesOptional"
                placeholder="Eg: New Tyre has been changed"
              >
              </ion-input>
            </ion-col>
          </ion-row>
        </ion-grid>

        <!-- Confirm Button -->
        <ion-button
          expand="block"
          [disabled]="busForm.invalid"
          class="confirm-btn"
          (click)="submitForm()"
        >
          Save
        </ion-button>
      </form>
    </ion-card>
  </div>
</ion-content>
